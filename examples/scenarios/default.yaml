# Default scenario - used when client sends no x-scenario-id metadata header.
# Flat low score, bonafide throughout, one sample every 5 s for the requested
# duration, FinalResult on stream close. The 5 s cadence mirrors the
# deepfake-service default analysis_interval_s=5.0 so client traces against
# the simulator look the same as traces against the real backend.
version: 1

scenario:
  id: default
  description: Flat bonafide stream — safe fallback when no scenario is selected.

stream:
  duration_ms: 30000
  chunk_interval_ms: 100

confidence_curve:
  type: linear
  emit_every_ms: 5000
  analysis_window_ms: 5000
  label_threshold: 0.5
  label_below: bonafide
  label_above: spoofed
  from: { at_ms: 0,     fake_probability: 0.05 }
  to:   { at_ms: 30000, fake_probability: 0.05 }
