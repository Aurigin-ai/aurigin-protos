# Mirrors deepfake-service running with `tail_strategy="recompute"` on the
# 10.001 s clip (examples/audio/fixtures/test_call_10s_tail.wav) at
# analysis_interval_s=5.0 and min_analysis_duration_s=1.0.
#
# Slide-back semantics: with duration_ms=10001 and analysis_interval_ms=5000:
#   - 1st main window fires normally at t=5000ms (offset=0, duration=5000)
#   - 2nd main window would land at t=10000ms with a 1ms residual that's
#     below min_analysis_duration_ms (1000) → instead the last window slides
#     back so it ends at end-of-stream: offset shifts to 5001ms, duration
#     stays exactly 5000ms (covers audio [5001ms, 10001ms]).
#
# Total coverage = audio bytes covered by both windows = 0–5000 + 5001–10001
# = 10000ms of unique audio + 1ms overlap. This mirrors backend-app HTTP
# /predict's chunk_audio behaviour byte-for-byte — pick this scenario only
# when you need score parity against the HTTP path.
#
# Expected on-wire shape:
#   CreateSessionResponse
#   AnalysisResult(offset=5000ms, duration=5000ms, label=bonafide)
#   AnalysisResult(offset=5001ms, duration=5000ms, label=bonafide)
#   FinalResult(total_audio_ms≥10001, analysis_count=2, label=bonafide)
version: 1

scenario:
  id: tail_recomputed_full_coverage
  description: 10.001s clip, 5s analysis interval — last window slides back so its duration stays exactly 5000ms and covers the tail.

stream:
  duration_ms: 10001
  chunk_interval_ms: 100

random:
  seed: 42

backend_simulation:
  analysis_interval_ms: 5000
  min_analysis_duration_ms: 1000
  tail_strategy: recompute

confidence_curve:
  type: noise
  label_threshold: 0.5
  base: 0.06
  amplitude: 0.04
