syntax = "proto3";

package aurigin.deepfake_detection.v1;

import "twilio/tme/extensions/common/v1/audio_buffer.proto";

// Deepfake Detection Service.
//
// Analyzes a continuous audio stream and emits deepfake detection results.
// Audio is sent as raw PCM buffers and analyzed in rolling windows.
//
// Session Lifecycle:
//   1. Client sends CreateSessionRequest with optional configuration
//   2. Server responds with CreateSessionResponse containing session_id
//   3. Client streams AudioBuffer messages continuously
//   4. Server emits AnalysisResult events as each window is analyzed
//   5. On stream end, server emits a FinalResult with aggregate stats
//
service DeepfakeDetection {
  // Bidirectional streaming RPC for real-time deepfake detection.
  rpc DetectDeepfake(stream DetectDeepfakeRequest) returns (stream DetectDeepfakeResponse);
}

// ============================================================================
// Request (Client -> Server)
// ============================================================================

message CreateSessionRequest {
  // Optional session configuration; server applies defaults for unset fields.
  optional DetectionConfig config = 1;
}

message DetectDeepfakeRequest {
  oneof request {
    CreateSessionRequest create_session_request = 1;
    twilio.tme.extensions.common.v1.AudioBuffer audio = 2;
  }
}

// ============================================================================
// Response (Server -> Client)
// ============================================================================

message DetectDeepfakeResponse {
  oneof response {
    CreateSessionResponse create_session_response = 1;
    AnalysisResult analysis_result = 2;
    FinalResult final_result = 3;
  }
}

message CreateSessionResponse {
  // Unique identifier for this session.
  string session_id = 1;
}

// ============================================================================
// Configuration
// ============================================================================

message DetectionConfig {
  // How many seconds of audio to accumulate before running analysis (default: 3.0).
  optional float analysis_interval_s = 1;
  // Model version to use, e.g. "stable" or "dev-v4" (default: server default).
  optional string model_version = 2;
}

// ============================================================================
// Analysis events
// ============================================================================

// Emitted each time a window of audio has been analyzed.
message AnalysisResult {
  // Audio offset from stream start (ms) - start of analyzed segment.
  int64 audio_offset_ms = 1;
  // Duration of the analyzed segment (ms).
  int64 duration_ms = 2;
  // Deepfake probability score [0-1]: 0.0 = fully bonafide, 1.0 = fully spoofed.
  float score = 3;
  // Human-readable classification: "bonafide", "spoofed", or "partially_spoofed".
  string label = 4;
  // Model confidence in this classification [0-1].
  float confidence = 5;
}

// Emitted once when the client closes the stream.
message FinalResult {
  // Total audio received (ms).
  int64 total_audio_ms = 1;
  // Average deepfake score across all analyzed windows [0-1].
  float overall_score = 2;
  // Aggregate classification: "bonafide", "spoofed", or "partially_spoofed".
  string overall_label = 3;
  // Number of analysis windows completed.
  int32 analysis_count = 4;
}
