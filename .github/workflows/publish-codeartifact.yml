name: Publish to AWS CodeArtifact

# Runs on every `v*` tag push and via the Actions "Run workflow" button.
# Publishes:
#   - @aurigin/protos to the CodeArtifact npm repo
#   - aurigin-protos  to the CodeArtifact PyPI  repo
#
# Required configuration (repo Settings → Secrets and variables → Actions):
#   secrets.AWS_ROLE_TO_ASSUME          IAM role ARN trusting GitHub OIDC
#   vars.AWS_REGION                     e.g. eu-west-1
#   vars.AURIGIN_CA_DOMAIN              CodeArtifact domain name
#   vars.AURIGIN_CA_DOMAIN_OWNER        AWS account ID owning the domain
#   vars.AURIGIN_CA_REPO                CodeArtifact repository name
#
# OIDC setup (one-time, in AWS):
#   1. Create an OIDC provider for token.actions.githubusercontent.com
#   2. Create an IAM role trusting that provider, scoped to this repo
#   3. Attach a policy with codeartifact:GetAuthorizationToken,
#      codeartifact:PublishPackageVersion, codeartifact:ReadFromRepository,
#      sts:GetServiceBearerToken
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0)'
        required: true

permissions:
  id-token: write   # required for OIDC role assumption
  contents: read

# One in-flight run per tag/version. A second push of the same tag (or a
# manual dispatch racing a tag push) queues behind the first.
concurrency:
  group: publish-codeartifact-${{ github.event.inputs.version || github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AURIGIN_CA_DOMAIN: ${{ vars.AURIGIN_CA_DOMAIN }}
      AURIGIN_CA_DOMAIN_OWNER: ${{ vars.AURIGIN_CA_DOMAIN_OWNER }}
      AURIGIN_CA_REPO: ${{ vars.AURIGIN_CA_REPO }}
    steps:
      - uses: actions/checkout@v5
        with:
          # Need history to verify the tag points at a commit on main.
          fetch-depth: 0

      - name: Verify tag is on main
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          git fetch --no-tags origin +refs/heads/main:refs/heads/main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" main; then
            echo "::error::Tag $GITHUB_REF_NAME points at $GITHUB_SHA, which is not on main." >&2
            echo "::error::Releases must be tagged on commits that have landed on main." >&2
            exit 1
          fi

      - name: Resolve and validate version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          # Reject anything that isn't strict semver (numbers + optional
          # pre-release / build metadata). Catches typos like v0.1 or
          # v0.1.0-rc? before twine/npm bail out with confusing errors.
          if ! [[ "$VERSION" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Version '$VERSION' is not valid semver (X.Y.Z[-prerelease][+build])." >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version resolved: $VERSION"

      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python build deps
        run: pip install --upgrade build twine

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Generate stubs
        run: make generate

      - name: Stamp TS package version
        working-directory: gen/ts
        run: |
          npm pkg set version="${{ steps.ver.outputs.version }}"
          npm run build

      - name: Publish TS to CodeArtifact
        run: bash scripts/publish-ts-codeartifact.sh

      - name: Stamp Python package version
        working-directory: gen/py
        run: |
          python -c "
          import pathlib, re
          p = pathlib.Path('pyproject.toml')
          p.write_text(re.sub(r'(?m)^version = .*', 'version = \"${{ steps.ver.outputs.version }}\"', p.read_text()))
          "

      - name: Publish Python to CodeArtifact
        run: bash scripts/publish-py-codeartifact.sh

      - name: Step summary
        run: |
          {
            echo "## Published to AWS CodeArtifact"
            echo ""
            echo "| Package | Version |"
            echo "|---|---|"
            echo "| \`@aurigin/protos\` (npm) | \`${{ steps.ver.outputs.version }}\` |"
            echo "| \`aurigin-protos\` (PyPI) | \`${{ steps.ver.outputs.version }}\` |"
            echo ""
            echo "**Domain:** \`${AURIGIN_CA_DOMAIN}\` · **Repository:** \`${AURIGIN_CA_REPO}\` · **Region:** \`${AWS_REGION}\`"
          } >> "$GITHUB_STEP_SUMMARY"
