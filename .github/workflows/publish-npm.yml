name: Publish to npm

# Manual promote-to-public publish of @aurigin/protos to https://www.npmjs.com/.
#
# Triggered ONLY via the Actions "Run workflow" button (typically by the
# release.yml orchestrator) — never automatic.
#
# Trust configuration (one-time, no secrets in this repo):
#   - npm Trusted Publisher → see infra/public/03-npm-oidc-publisher.md
#                             binding: (owner, repo, workflow file=publish-npm.yml,
#                             environment=public-release).
#
# The `public-release` GitHub Environment exists on this repo purely so the
# OIDC token carries an `environment` claim that npm's Trusted Publisher
# binding can match. It does not gate the workflow (no required reviewers).
#
# No NPM_TOKEN. The trust chain is a short-lived OIDC token minted at job
# start, validated by npm against the Trusted Publisher binding. --provenance
# attaches a sigstore attestation signed with the same OIDC identity.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (must match a v<version> tag on main, e.g. 0.1.0)'
        required: true
        type: string

permissions:
  id-token: write   # OIDC token for npm Trusted Publisher + --provenance
  contents: read

# One in-flight npm publish per version. A second dispatch of the same
# version queues behind the first instead of racing it.
concurrency:
  group: publish-npm-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: public-release
      url: https://www.npmjs.com/package/@aurigin/protos/v/${{ inputs.version }}
    steps:
      - name: Validate version is strict semver
        run: |
          VERSION="${{ inputs.version }}"
          # Strict semver: numbers + optional pre-release / build metadata.
          # Catches typos like 0.1 or 0.1.0-rc? before npm bails out with a
          # confusing error.
          if ! [[ "$VERSION" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Version '$VERSION' is not valid semver (X.Y.Z[-prerelease][+build])."
            exit 1
          fi

      - uses: actions/checkout@v5
        with:
          ref: v${{ inputs.version }}
          # Full history so we can verify the tag is reachable from main.
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          git fetch --no-tags origin +refs/heads/main:refs/heads/main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" main; then
            echo "::error::Tag v${{ inputs.version }} ($GITHUB_SHA) is not reachable from main." >&2
            echo "::error::Only commits that have landed on main can be promoted to public registries." >&2
            exit 1
          fi

      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          # Forces the public npm registry. Without this, a leftover .npmrc
          # from the CodeArtifact path could redirect publish to AWS.
          # Also required for --provenance (works only against npmjs.org).
          registry-url: 'https://registry.npmjs.org'

      - name: Generate language stubs
        run: make generate

      - name: Stamp TS package version
        working-directory: gen/ts
        run: npm pkg set version="${{ inputs.version }}"

      - name: Install + build TS
        working-directory: gen/ts
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Publish to npm (Trusted Publisher + sigstore provenance)
        working-directory: gen/ts
        # --provenance attaches sigstore attestation of commit + workflow.
        # --access public required on first publish of a scoped package;
        #   no-op on subsequent publishes.
        # No NODE_AUTH_TOKEN / NPM_TOKEN — npm validates the OIDC token
        # against the Trusted Publisher binding.
        run: npm publish --provenance --access public

      - name: Step summary
        if: always()
        run: |
          {
            echo "## Published to npm"
            echo ""
            echo "| Package | Version | Where |"
            echo "|---|---|---|"
            echo "| \`@aurigin/protos\` | \`${{ inputs.version }}\` | https://www.npmjs.com/package/@aurigin/protos/v/${{ inputs.version }} |"
            echo ""
            echo "Artifact includes sigstore build provenance."
            echo ""
            echo "**Tag:** \`v${{ inputs.version }}\` · **Commit:** \`${{ github.sha }}\` · **Workflow:** \`${{ github.workflow }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
