name: Publish to GitHub Packages

# Runs on every `v*` tag push (e.g. `git tag v0.1.0 && git push --tags`)
# and can also be invoked manually via the Actions UI.
#
# Outputs:
#   - npm package `@<repo-owner>/protos` published to GitHub Packages
#   - Python wheel + sdist attached to a GitHub Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0)'
        required: true

permissions:
  contents: write   # for `gh release create`
  packages: write   # for `npm publish`

# One in-flight run per tag/version. A second push of the same tag queues.
concurrency:
  group: publish-github-${{ github.event.inputs.version || github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Need history to verify the tag points at a commit on main.
          fetch-depth: 0

      - name: Verify tag is on main
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          git fetch --no-tags origin +refs/heads/main:refs/heads/main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" main; then
            echo "::error::Tag $GITHUB_REF_NAME points at $GITHUB_SHA, which is not on main." >&2
            echo "::error::Releases must be tagged on commits that have landed on main." >&2
            exit 1
          fi

      - name: Resolve and validate version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if ! [[ "$VERSION" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Version '$VERSION' is not valid semver (X.Y.Z[-prerelease][+build])." >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version resolved: $VERSION"

      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python build deps
        run: pip install --upgrade build

      - name: Generate stubs
        run: make generate

      - name: Stamp TS package (name + version + registry)
        working-directory: gen/ts
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          npm pkg set name="@${OWNER_LC}/protos"
          npm pkg set version="${{ steps.ver.outputs.version }}"
          npm pkg set publishConfig.registry="https://npm.pkg.github.com"
          npm run build

      - name: Publish TS to GitHub Packages
        working-directory: gen/ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish

      - name: Stamp Python package version
        working-directory: gen/py
        run: |
          python -c "
          import pathlib, re
          p = pathlib.Path('pyproject.toml')
          p.write_text(re.sub(r'(?m)^version = .*', 'version = \"${{ steps.ver.outputs.version }}\"', p.read_text()))
          "

      - name: Build Python wheel + sdist
        working-directory: gen/py
        run: python -m build

      - name: Attach Python artefacts to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.ver.outputs.version }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" gen/py/dist/* --clobber
          else
            gh release create "$TAG" gen/py/dist/* --title "$TAG" --generate-notes
          fi

      - name: Step summary
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          TAG="v${{ steps.ver.outputs.version }}"
          {
            echo "## Published to GitHub Packages + Releases"
            echo ""
            echo "| Output | Location |"
            echo "|---|---|"
            echo "| npm package | \`@${OWNER_LC}/protos@${{ steps.ver.outputs.version }}\` ([Packages](https://github.com/${{ github.repository }}/pkgs/npm/protos)) |"
            echo "| Python wheel + sdist | [Release ${TAG}](https://github.com/${{ github.repository }}/releases/tag/${TAG}) |"
          } >> "$GITHUB_STEP_SUMMARY"
