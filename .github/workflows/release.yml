name: Release

# Manual orchestrator that cuts a new release in one click:
#   1. Tags the current HEAD of main with v<version>.
#   2. Creates a GitHub Release at that tag with auto-generated notes.
#   3. Dispatches publish-codeartifact.yml, publish-pypi.yml, publish-npm.yml
#      with the same `version` input. The public-* workflows declare the
#      `public-release` GitHub Environment so the OIDC token carries an
#      `environment` claim that matches the PyPI / npm Trusted Publisher
#      bindings. There are no required reviewers on the env, so they don't
#      pause for approval — they run straight through.
#
# This is the only workflow that should be triggered directly by a release
# manager. The three publish-* workflows can still be dispatched individually
# (re-runs, partial recoveries) but the normal flow is through here.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New release version (X.Y.Z[-prerelease], no leading v)'
        required: true
        type: string
      ref:
        description: 'Branch or commit to tag (default: main)'
        required: false
        default: 'main'
        type: string

permissions:
  contents: write    # create the tag and the GitHub Release
  actions:  write    # dispatch the publish-* workflows

# One in-flight release per version. A second dispatch of the same version
# queues behind the first instead of racing it.
concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Validate version is strict semver
        run: |
          VERSION="${{ inputs.version }}"
          if ! [[ "$VERSION" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Version '$VERSION' is not valid semver (X.Y.Z[-prerelease][+build])."
            exit 1
          fi

      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
          # Full history so auto-generated release notes can diff against the
          # previous tag, and so we can verify the ref is on main.
          fetch-depth: 0

      - name: Verify ref is on main
        run: |
          # Fetch main into a non-checked-out ref to avoid git's safety
          # check ("refusing to fetch into branch ... checked out at ..."):
          # when this workflow is dispatched from main the working tree is
          # already on main, so `+refs/heads/main:refs/heads/main` would
          # overwrite the live ref. Land it under refs/remotes/origin/main
          # and compare against that.
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main; then
            echo "::error::Ref '${{ inputs.ref }}' ($GITHUB_SHA) is not on main." >&2
            echo "::error::Releases must be cut from a commit that has landed on main." >&2
            exit 1
          fi

      - name: Verify tag does not already exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ inputs.version }}"
          if gh api "repos/${{ github.repository }}/git/refs/tags/$TAG" --silent 2>/dev/null; then
            echo "::error::Tag $TAG already exists. Pick a new version or delete the tag first." >&2
            exit 1
          fi

      - name: Create and push tag
        run: |
          TAG="v${{ inputs.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Annotated (not lightweight) so GitHub renders it as a real release
          # tag and `git describe` works as expected downstream.
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub Release with auto-generated notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ inputs.version }}"
          # --generate-notes diffs the PRs/commits since the previous release
          # tag and builds a "What's Changed" + contributors section. Marks
          # pre-release if the version contains a hyphen (semver pre-release).
          EXTRA=()
          if [[ "${{ inputs.version }}" == *-* ]]; then
            EXTRA+=(--prerelease)
          fi
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "$TAG" \
            --target "$GITHUB_SHA" \
            --generate-notes \
            "${EXTRA[@]}"

      - name: Dispatch publish-codeartifact.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run publish-codeartifact.yml \
            --repo "${{ github.repository }}" \
            --ref "${{ inputs.ref }}" \
            -f version="${{ inputs.version }}"

      - name: Dispatch publish-pypi.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run publish-pypi.yml \
            --repo "${{ github.repository }}" \
            --ref "${{ inputs.ref }}" \
            -f version="${{ inputs.version }}"

      - name: Dispatch publish-npm.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run publish-npm.yml \
            --repo "${{ github.repository }}" \
            --ref "${{ inputs.ref }}" \
            -f version="${{ inputs.version }}"

      - name: Step summary
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          TAG="v${{ inputs.version }}"
          {
            echo "## Release \`$TAG\` cut"
            echo ""
            echo "- **Tag:** [\`$TAG\`](https://github.com/$REPO/releases/tag/$TAG) at \`$GITHUB_SHA\`"
            echo "- **GitHub Release:** auto-generated notes from PRs/commits since the previous tag"
            echo ""
            echo "### Publish workflows dispatched"
            echo ""
            echo "| Workflow | Where |"
            echo "|---|---|"
            echo "| publish-codeartifact.yml | internal CodeArtifact (PyPI + npm) |"
            echo "| publish-pypi.yml         | pypi.org                            |"
            echo "| publish-npm.yml          | npmjs.com                           |"
            echo ""
            echo "Watch them at: https://github.com/$REPO/actions"
          } >> "$GITHUB_STEP_SUMMARY"
