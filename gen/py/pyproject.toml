[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aurigin-protos"
version = "0.0.0"
description = "Generated gRPC Python stubs for Aurigin services"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "grpcio>=1.62",
    "protobuf>=4.25",
]

[tool.hatch.build.targets.wheel]
packages = ["aurigin", "twilio"]
