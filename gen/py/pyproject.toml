[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aurigin-protos"
version = "0.0.0"
description = "Generated gRPC Python stubs for Aurigin services"
readme = "README.md"
license = "Apache-2.0"
license-files = ["LICENSE"]
requires-python = ">=3.10"
dependencies = [
    "grpcio>=1.62",
    "protobuf>=4.25",
]

[project.urls]
Homepage      = "https://github.com/Aurigin-ai/aurigin-protos"
Source        = "https://github.com/Aurigin-ai/aurigin-protos"
"Bug Tracker" = "https://github.com/Aurigin-ai/aurigin-protos/issues"

[tool.hatch.build.targets.wheel]
packages = ["aurigin", "twilio"]
